      z-index: 10;

      margin: 3px 0;

<body>
<div class="slider-container" style="top: 370px;">
<label for="modelUpload">Upload GLB/OBJ to Replace Selected Box</label>
<input accept=".glb,.gltf,.obj" id="modelUpload" type="file"/>
</div>
<!-- UI -->
<div class="slider-container" style="top: 10px;">
<div>Opacity</div>
<input id="opacitySlider" max="1" min="0" step="0.01" type="range" value="1"/>
</div>
<div class="slider-container" style="top: 60px;">
<div>Scale X: <span id="scaleXValue">1.5</span></div>
<input id="scaleSliderX" max="5" min="0.5" step="0.01" type="range" value="1.5"/>
</div>
<div class="slider-container" style="top: 120px;">
<div>Scale Y: <span id="scaleYValue">1.5</span></div>
<input id="scaleSliderY" max="5" min="0.5" step="0.01" type="range" value="1.5"/>
</div>
<div class="slider-container" style="top: 180px; display: flex; align-items: center; gap: 8px;">
<input id="coordToggle" type="checkbox"/>
<label for="coordToggle">Coordinate Mode</label>
</div>
<div class="slider-container" style="top: 220px; display: flex; align-items: center; gap: 8px;">
<input id="dragToggle" type="checkbox"/>
<label for="dragToggle">Drag Mode</label>
</div>
<div class="btn-group">
<button id="exportJSON">Export JSON</button>
<button id="exportCSV">Export CSV</button>
</div>
<div id="labelContainer" style="position:absolute;top:0;left:0;"></div>
<script>
let modelUploadPendingFile = null;
let modelUploadExtension = null;

document.getElementById("modelUpload").addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) return;

  modelUploadPendingFile = file;
  modelUploadExtension = file.name.split('.').pop().toLowerCase();
  alert("Now click on a box to replace it with the uploaded model.");
});

function handleModelReplacement(targetObject) {
  const file = modelUploadPendingFile;
  if (!file || !targetObject) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const url = e.target.result;

    const box = new THREE.Box3().setFromObject(targetObject);
    const size = box.getSize(new THREE.Vector3());
    const pos = targetObject.position.clone();
    const label = targetObject.userData.label;

    scene.remove(targetObject);
    objects = objects.filter(o => o !== targetObject);

    const onSuccess = (model) => {
      const object = (modelUploadExtension === "glb" || modelUploadExtension === "gltf") ? model.scene : model;
      object.scale.set(size.x / 10, size.y / 10, size.z / 10);
      object.position.copy(pos);
      object.userData.label = label;
      scene.add(object);
      objects.push(object);
      selectedObject = object;
      controls.enabled = true;
      modelUploadPendingFile = null;
    };

    const onError = (e) => {
      alert("Error loading model: " + e.message);
    };

    if (modelUploadExtension === "obj") {
      const loader = new THREE.OBJLoader();
      loader.load(url, onSuccess, undefined, onError);
    } else {
      const loader = new THREE.GLTFLoader();
      loader.load(url, onSuccess, undefined, onError);
    }
  };
  reader.readAsDataURL(file);
}

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  scene.background = new THREE.Color(0xffffff)
  camera.position.set(300, 300, 300);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.GridHelper(1000, 50));
  scene.add(new THREE.AmbientLight(0x888888));
  let light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(1, 2, 3);
  scene.add(light);

  createBoxes();
  if (imageURL) loadImage();

  document.getElementById("opacitySlider").addEventListener("input", e => {
    let o = parseFloat(e.target.value);
    objects.forEach(obj => {
      obj.material.opacity = o;
      obj.material.transparent = o < 1;
    });
  });

  document.getElementById("scaleSliderX").addEventListener("input", e => {
    imageScaleX = parseFloat(e.target.value);
    document.getElementById("scaleXValue").textContent = imageScaleX.toFixed(2);
    updatePositions();
  });
  document.getElementById("scaleSliderY").addEventListener("input", e => {
    imageScaleY = parseFloat(e.target.value);
    document.getElementById("scaleYValue").textContent = imageScaleY.toFixed(2);
    updatePositions();
  });

  document.getElementById("coordToggle").addEventListener("change", e => {
    coordMode = e.target.checked;
    dragMode = false;
    document.getElementById("dragToggle").checked = false;
    controls.enabled = !coordMode;
  });

  document.getElementById("dragToggle").addEventListener("change", e => {
    dragMode = e.target.checked;
    coordMode = false;
    document.getElementById("coordToggle").checked = false;
    controls.enabled = !dragMode;
  });

  document.getElementById("exportJSON").addEventListener("click", () => {
    let out = objects.map((o, i) => ({
      id: o.userData.label || `Box${i}`,
      x: o.position.x,
      y: -o.position.z,  // Flipped
      z: o.position.y
    }));
    saveFile(JSON.stringify(out, null, 2), "positions.json");
  });

  document.getElementById("exportCSV").addEventListener("click", () => {
    let csv = "ID,X(mm),Y(mm),Z(mm)\n";
    objects.forEach((o, i) => {
      let id = o.userData.label || `Box${i}`;
      csv += `${id},${o.position.x.toFixed(2)},${(-o.position.z).toFixed(2)},${o.position.y.toFixed(2)}\n`;
    });
    saveFile(csv, "positions.csv");
  });

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  window.addEventListener("mousedown", onMouseDown);
  window.addEventListener("mouseup", onMouseUp);
  window.addEventListener("mousemove", onMouseMove);

  animate();
}

function createBoxes() {
  const container = document.getElementById("labelContainer");
  ar.forEach(([l, w, h, x, z, label], i) => {
    const r = Math.floor(30 + Math.random()*100);
    const g = Math.floor(30 + Math.random()*100);
    const b = Math.floor(30 + Math.random()*100);
    const color = new THREE.Color(`rgb(${r},${g},${b})`);
    const geo = new THREE.BoxGeometry(l, h, w);
    const mat = new THREE.MeshStandardMaterial({ color });
    const box = new THREE.Mesh(geo, mat);
    box.userData.label = label;
    scene.add(box);
    originalPositions.push([x, z]);
    box.position.set(x * imageScaleX / 1.5, h/2, z * imageScaleY / 1.5);
    objects.push(box);

    if (label && label.trim()) {
      const div = document.createElement("div");
      div.className = "label-overlay";
      div.textContent = label;
      container.appendChild(div);
      labels.push(box);
      labelElements.push(div);
    }
  });
}

function loadImage() {
  new THREE.TextureLoader().load(imageURL, texture => {
    const w = texture.image.width / 10;
    const h = texture.image.height / 10;
    const geo = new THREE.PlaneGeometry(w, h);
    const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
    backgroundMesh = new THREE.Mesh(geo, mat);
    backgroundMesh.rotation.x = -Math.PI / 2;
    backgroundMesh.position.set(0, 0.01, 0);
    backgroundMesh.scale.set(imageScaleX / 1.5, imageScaleY / 1.5, 1);
    scene.add(backgroundMesh);

    // === Dynamic Camera Fit Based on Image Size ===
    const maxDim = Math.max(w * imageScaleX / 1.5, h * imageScaleY / 1.5);
    const fovRad = THREE.MathUtils.degToRad(camera.fov);
    const fitHeightDistance = (maxDim / 2) / Math.tan(fovRad / 2);
    const margin = 1.2;
    const camY = fitHeightDistance * margin;

    // === FIX: Restore default camera up direction ===
    camera.position.set(0, camY, 0);
    camera.up.set(0, 1, 0); // ← Fixed
    camera.lookAt(0, 0, 0);
    controls.target.set(0, 0, 0);
    controls.update();
  });
}

function updatePositions() {
  objects.forEach((obj, i) => {
    const [x, z] = originalPositions[i];
    obj.position.set(x * imageScaleX / 1.5, obj.geometry.parameters.height / 2, z * imageScaleY / 1.5);
  });
  if (backgroundMesh) {
    backgroundMesh.scale.set(imageScaleX / 1.5, imageScaleY / 1.5, 1);
  }
}

function onMouseDown(e) {
  if (e.button !== 0) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  if (dragMode) {
    const hit = raycaster.intersectObjects(objects)[0];
    if (hit) dragObject = hit.object;
  }
}

function onMouseMove(e) {
  if (!dragObject) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const pt = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(plane, pt)) {
    dragObject.position.x = Math.round(pt.x);
    dragObject.position.z = Math.round(pt.z);
  }
}

function onMouseUp(e) {
  if (dragObject) return dragObject = null;
  if (!coordMode) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hit = raycaster.intersectObjects(objects)[0];
  const div = document.getElementById("coordLabel") || (() => {
    const d = document.createElement("div");
    d.id = "coordLabel";
    d.style.position = "absolute";
    d.style.bottom = "10px";
    d.style.left = "10px";
    d.style.background = "white";
    d.style.padding = "5px";
    d.style.zIndex = "10";
    document.body.appendChild(d);
    return d;
  })();
  if (hit) {
    if (modelUploadPendingFile) return handleModelReplacement(hit.object);
    selectedObject = hit.object;
    const p = hit.object.position;
    div.textContent = `Box center: X=${p.x.toFixed(2)} Y=${(-p.z).toFixed(2)} Z=${p.y.toFixed(2)}`;
  } else {
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const pt = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(plane, pt)) {
      div.textContent = `Point: X=${pt.x.toFixed(2)} Y=${(-pt.z).toFixed(2)} Z=${pt.y.toFixed(2)}`;
    }
  }
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  labels.forEach((obj, i) => {
    const pos = obj.position.clone().project(camera);
    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (1 - (pos.y * 0.5 + 0.5)) * window.innerHeight;
    labelElements[i].style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
  });
}

function saveFile(content, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content]));
  a.download = name;
  a.click();
}


</script>
</body>
