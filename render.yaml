services:
  - type: web
    name: threed-fdm-temperature-field-generator
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SOLVER_MAX_CELLS
        value: "400000"
      - key: SOLVER_MAX_RADIATION_OUTER
        value: "4"
      - key: SOLVER_DIRECT_SOLVE_CELL_LIMIT
        value: "180000"
      - key: MANIFEST_SYNC_MODE
        value: "github"
      - key: MANIFEST_GITHUB_REPO
        value: "ShivanshRai1/3D-FDM-temperature-field-generator"
      - key: MANIFEST_GITHUB_BRANCH
        value: "main"
      - key: MANIFEST_GITHUB_PATH
        value: "temp/simulation_runs"
